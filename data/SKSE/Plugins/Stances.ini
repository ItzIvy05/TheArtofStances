[XP]
; Skill-use magnitude sent to Custom Skills Framework per valid player kill.
; CSF applies the Stances.json formula after this.
fSkillUsePerKill = 8.0

; Adds victim level * fVictimLevelMult to fSkillUsePerKill.
bScaleWithVictimLevel = true
fVictimLevelMult = 0.35

[Debug]
; Master toggle for this DLL's informational logging, including the
; one-log-line-per-valid-XP-award messages. Warnings and errors are
; always written regardless. Keep false for normal gameplay.
bEnableLogging = false
